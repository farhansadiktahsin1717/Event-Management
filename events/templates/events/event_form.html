{% extends "base.html" %}

{% block title %}{{ title }}{% endblock %}

{% block content %}
<section class="mx-auto max-w-3xl rounded-xl border border-slate-200 bg-white p-6">
    <h1 class="mb-4 text-2xl font-bold">{{ title }}</h1>
    <form method="post" enctype="multipart/form-data" class="space-y-4">
        {% csrf_token %}
        {% for field in form %}
            <div>
                <label for="{{ field.id_for_label }}" class="mb-1 block text-sm font-semibold text-slate-700">{{ field.label }}</label>
                {{ field }}
                {% if field.errors %}
                    <div class="mt-1 text-sm text-rose-700">{{ field.errors|striptags }}</div>
                {% endif %}
            </div>
        {% endfor %}
        <div class="flex flex-wrap gap-2 pt-2">
            <button type="submit" class="rounded-lg bg-cyan-700 px-4 py-2 text-sm font-semibold text-white hover:bg-cyan-800">Save</button>
            <a href="{% url 'events:list' %}" class="rounded-lg border border-slate-300 px-4 py-2 text-sm font-semibold hover:bg-slate-100">Cancel</a>
        </div>
    </form>
</section>
{% endblock %}
