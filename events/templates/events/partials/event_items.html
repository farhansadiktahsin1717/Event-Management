<div class="space-y-3">
    {% for event in events %}
        <article class="rounded-lg border border-slate-200 p-4">
            <div class="flex flex-wrap items-center justify-between gap-2">
                <h3 class="text-base font-bold">{{ event.name }}</h3>
                <span class="rounded-full bg-slate-100 px-3 py-1 text-xs font-semibold">{{ event.category.name }}</span>
            </div>
            <p class="mt-2 text-sm text-slate-600">{{ event.date }} at {{ event.time }} | {{ event.location }}</p>
            <a href="{% url 'events:detail' event.pk %}" class="mt-3 inline-block text-sm font-semibold text-cyan-700 hover:text-cyan-800">Open Details</a>
        </article>
    {% empty %}
        <div class="rounded-lg border border-dashed border-slate-300 p-6 text-sm text-slate-600">{{ empty_text }}</div>
    {% endfor %}
</div>
