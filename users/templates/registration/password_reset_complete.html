{% extends "base.html" %}

{% block title %}Password Reset Complete{% endblock %}

{% block content %}
<section class="mx-auto max-w-md rounded-xl border border-slate-200 bg-white p-6 text-center">
    <h1 class="mb-3 text-2xl font-bold">Password Updated</h1>
    <p class="text-sm text-slate-600">Your password has been reset successfully.</p>
    <a href="{% url 'users:login' %}" class="mt-4 inline-block rounded-lg bg-cyan-700 px-4 py-2 text-sm font-semibold text-white hover:bg-cyan-800">Login</a>
</section>
{% endblock %}
