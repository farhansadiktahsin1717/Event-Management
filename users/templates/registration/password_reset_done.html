{% extends "base.html" %}

{% block title %}Email Sent{% endblock %}

{% block content %}
<section class="mx-auto max-w-md rounded-xl border border-slate-200 bg-white p-6 text-center">
    <h1 class="mb-3 text-2xl font-bold">Check Your Email</h1>
    <p class="text-sm text-slate-600">If an account exists for that email, a password reset link has been sent.</p>
    <a href="{% url 'users:login' %}" class="mt-4 inline-block rounded-lg border border-slate-300 px-4 py-2 text-sm font-semibold hover:bg-slate-100">Back to Login</a>
</section>
{% endblock %}
