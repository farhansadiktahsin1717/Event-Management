{% extends "base.html" %}

{% block title %}Delete Participant{% endblock %}

{% block content %}
<section class="mx-auto max-w-xl rounded-xl border border-rose-200 bg-white p-6">
    <h1 class="mb-2 text-xl font-bold text-rose-700">Delete Participant</h1>
    <p class="mb-4 text-sm text-slate-700">Are you sure you want to delete <span class="font-semibold">{{ participant.name }}</span>?</p>
    <form method="post" class="flex gap-2">
        {% csrf_token %}
        <button type="submit" class="rounded-lg bg-rose-600 px-4 py-2 text-sm font-semibold text-white hover:bg-rose-700">Delete</button>
        <a href="{% url 'users:list' %}" class="rounded-lg border border-slate-300 px-4 py-2 text-sm font-semibold hover:bg-slate-100">Cancel</a>
    </form>
</section>
{% endblock %}
